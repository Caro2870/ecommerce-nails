services:
  db:
    image: mysql:8.4
    container_name: ecommerce-nails-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${NAILS_DB_DATABASE}
      MYSQL_USER: ${NAILS_DB_USERNAME}
      MYSQL_PASSWORD: ${NAILS_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: ecommerce-nails-app
    restart: unless-stopped
    environment:
      APP_NAME: ${NAILS_APP_NAME:-Jessica Nails Studio}
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: ${APP_URL}
      APP_TIMEZONE: America/Lima
      APP_LOCALE: es
      APP_FALLBACK_LOCALE: es
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${NAILS_DB_DATABASE}
      DB_USERNAME: ${NAILS_DB_USERNAME}
      DB_PASSWORD: ${NAILS_DB_PASSWORD}
      DB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      FILESYSTEM_DISK: public
      NAILS_ADMIN_EMAIL: ${NAILS_ADMIN_EMAIL}
      NAILS_ADMIN_PASSWORD: ${NAILS_ADMIN_PASSWORD}
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./public:/var/www/html/public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - prittor-proxy

volumes:
  db_data:

networks:
  prittor-proxy:
    external: true
